    <style>
        body {
            background-color: #121212;
            color: #ffffff;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .container {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }

        .hand-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .svg-wrapper {
            /* Adjust size to match phone screen ratio roughly */
            width: 300px;
            height: 400px;
            border: 2px dashed #444;
            border-radius: 8px;
            position: relative;
            background-color: rgba(255, 255, 255, 0.05);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Add some padding so it doesn't touch the edges */
            box-sizing: border-box;
        }

        h3 {
            margin-bottom: 20px;
            color: #d4af37;
        }
    </style>
</head>
